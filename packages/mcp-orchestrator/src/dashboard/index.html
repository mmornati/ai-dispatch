<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dispatch Dashboard</title>
<style>
  :root { --bg:#0f1117; --surface:#1a1d27; --surface2:#232735; --border:#2d3348; --text:#e1e4ed; --text2:#8b92a8; --accent:#6c8aff; --green:#34d399; --red:#f87171; --yellow:#fbbf24; --blue:#60a5fa; --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }
  .light { --bg:#f5f6fa; --surface:#fff; --surface2:#eef0f6; --border:#d1d5db; --text:#1f2937; --text2:#6b7280; }
  .header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
  .header h1 { font-size:18px; font-weight:700; display:flex; align-items:center; gap:8px; }
  .header h1 span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:12px; }
  .header-right label { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:4px; cursor:pointer; }
  .header-right input[type="checkbox"] { accent-color:var(--accent); }
  .header-right button { background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:12px; }
  .header-right button:hover { background:var(--border); }
  #statusDot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--green); }
  #statusDot.error { background:var(--red); }
  #statusDot.loading { background:var(--yellow); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #statusMsg { font-size:11px; color:var(--text2); }
  .tabs { display:flex; border-bottom:1px solid var(--border); padding:0 24px; overflow-x:auto; }
  .tab { padding:10px 20px; cursor:pointer; font-size:13px; font-weight:500; color:var(--text2); border-bottom:2px solid transparent; white-space:nowrap; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .content { padding:20px 24px; max-width:1200px; }
  .error-box { background:#3a1a1e; border:1px solid var(--red); border-radius:6px; padding:12px 16px; margin-bottom:16px; font-size:13px; color:var(--red); }
  .error-box pre { margin-top:8px; font-size:11px; white-space:pre-wrap; color:var(--text2); }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .card .num { font-size:28px; font-weight:700; }
  .card .label { font-size:12px; color:var(--text2); margin-top:2px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:8px 10px; color:var(--text2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
  td { padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
  tr:hover td { background:var(--surface2); }
  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .b-queued { background:#1e3a5f; color:var(--blue); }
  .b-running { background:#1e3a2f; color:var(--green); }
  .b-completed { background:#1a3a2e; color:var(--green); }
  .b-failed { background:#3a1a1e; color:var(--red); }
  .b-cancelled { background:#2d2d2d; color:var(--text2); }
  .mirror-pass { color:var(--green); } .mirror-fail { color:var(--red); } .mirror-revision { color:var(--yellow); }
  .progress-text { font-size:12px; color:var(--text2); }
  .kb-tree { font-size:13px; }
  .kb-tree .dir { cursor:pointer; padding:3px 0; }
  .kb-tree .dir::before { content:"+ "; font-size:12px; color:var(--text2); display:inline-block; width:16px; }
  .kb-tree .dir.open::before { content:"- "; }
  .kb-tree .file { padding:3px 0 3px 18px; cursor:pointer; display:flex; justify-content:space-between; }
  .kb-tree .file:hover,.kb-tree .dir:hover { color:var(--accent); }
  .kb-tree .file .size { color:var(--text2); font-size:11px; }
  .kb-tree .children { display:none; padding-left:16px; }
  .kb-tree .children.open { display:block; }
  .kb-preview { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:16px; margin-top:12px; white-space:pre-wrap; font-size:13px; max-height:500px; overflow:auto; }
  .agent-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  .agent-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; }
  .agent-card h3 { font-size:15px; margin-bottom:8px; }
  .agent-card .field { font-size:12px; color:var(--text2); margin-bottom:4px; }
  .agent-card .field strong { color:var(--text); }
  .dag-list { display:flex; flex-direction:column; gap:8px; }
  .dag-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 16px; font-size:13px; }
  .dag-item .dag-meta { color:var(--text2); font-size:12px; margin-top:4px; }
  .tt { font-family:"SFMono-Regular",Consolas,monospace; font-size:12px; }
  .mb-12 { margin-bottom:12px; }
  .empty { color:var(--text2); font-style:italic; padding:20px 0; }
  .hidden { display:none !important; }
  .loading { text-align:center; padding:40px 0; color:var(--text2); }
  .kb-container { display:flex; gap:16px; align-items:flex-start; }
  .kb-tree-panel { flex:0 0 320px; min-width:220px; max-height:70vh; overflow-y:auto; }
  .kb-preview-panel { flex:1; min-width:0; }
  .kb-preview-panel .kb-preview { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:16px; max-height:70vh; overflow-y:auto; line-height:1.7; }
  .kb-preview-panel .kb-preview h1 { font-size:20px; font-weight:700; margin:0 0 12px 0; padding-bottom:8px; border-bottom:1px solid var(--border); }
  .kb-preview-panel .kb-preview h2 { font-size:17px; font-weight:600; margin:16px 0 8px 0; }
  .kb-preview-panel .kb-preview h3 { font-size:15px; font-weight:600; margin:12px 0 6px 0; color:var(--accent); }
  .kb-preview-panel .kb-preview p { margin:0 0 8px 0; }
  .kb-preview-panel .kb-preview strong { color:#fff; }
  .light .kb-preview-panel .kb-preview strong { color:#000; }
  .kb-preview-panel .kb-preview code { background:var(--surface2); padding:2px 6px; border-radius:3px; font-size:13px; font-family:"SFMono-Regular",Consolas,monospace; }
  .kb-preview-panel .kb-preview pre { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:12px 16px; overflow-x:auto; margin:8px 0; }
  .kb-preview-panel .kb-preview pre code { background:none; padding:0; border-radius:0; }
  .kb-preview-panel .kb-preview ul,.kb-preview-panel .kb-preview ol { margin:0 0 8px 16px; }
  .kb-preview-panel .kb-preview li { margin-bottom:4px; }
  .kb-preview-panel .kb-preview hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
  .kb-preview-panel .kb-preview blockquote { border-left:3px solid var(--accent); padding:4px 12px; margin:8px 0; color:var(--text2); background:var(--surface2); border-radius:0 4px 4px 0; }
  .kb-preview-panel .kb-preview table { width:100%; border-collapse:collapse; font-size:13px; margin:8px 0; }
  .kb-preview-panel .kb-preview th,.kb-preview-panel .kb-preview td { border:1px solid var(--border); padding:6px 10px; text-align:left; }
  .kb-preview-panel .kb-preview th { background:var(--surface2); font-weight:600; }
  .kb-preview-empty { color:var(--text2); font-style:italic; display:flex; align-items:center; justify-content:center; height:200px; border:1px dashed var(--border); border-radius:6px; }
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>
<div class="header">
  <h1><span>◆</span> AI Dispatch <span id="statusDot" class="loading"></span><span id="statusMsg">loading...</span></h1>
  <div class="header-right">
    <label><input type="checkbox" id="autoRefresh"> auto-refresh</label>
    <button id="refreshBtn" onclick="loadAll()">refresh</button>
    <button id="themeBtn" onclick="toggleTheme()">☀</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="dashboard">Dashboard</div>
  <div class="tab" data-tab="tasks">Tasks</div>
  <div class="tab" data-tab="kb">KB</div>
  <div class="tab" data-tab="agents">Agents</div>
  <div class="tab" data-tab="dags">DAGs</div>
</div>
<div class="content" id="content"><div class="loading">Loading dashboard...</div></div>

<script>
// Status
function setStatus(state, msg) {
  const dot = document.getElementById("statusDot");
  const msgEl = document.getElementById("statusMsg");
  if (!dot || !msgEl) return;
  dot.className = state;
  msgEl.textContent = msg || "";
}

// DOM helpers
function $(id) { return document.getElementById(id); }

// Theme
function toggleTheme() {
  document.body.classList.toggle("light");
  const btn = document.getElementById("themeBtn");
  if (btn) btn.textContent = document.body.classList.contains("light") ? "\u{1F319}" : "\u2600";
}

// API
async function api(path) {
  const r = await fetch(path);
  if (!r.ok) {
    let text;
    try { text = await r.text(); } catch { text = r.statusText; }
    throw new Error(r.status + ": " + text.slice(0, 200));
  }
  return r.json();
}

// Tab switching
let lastTab = "dashboard";
let selectedKbFile = null; // preserves file selection across KB refreshes

function initTabs() {
  document.querySelectorAll(".tab").forEach(function(t) {
    t.addEventListener("click", function() {
      document.querySelectorAll(".tab").forEach(function(x) { x.classList.remove("active"); });
      t.classList.add("active");
      lastTab = t.textContent.trim().toLowerCase();
      loadTab(lastTab);
    });
  });
}

function loadAll() {
  loadTab(lastTab);
}

// Loader wrapper
async function loadTab(name) {
  var el = document.getElementById("content");
  var oldContent = el ? el.innerHTML : "";
  try {
    var handlers = { dashboard: loadDashboard, tasks: loadTasks, kb: loadKb, agents: loadAgents, dags: loadDags };
    var fn = handlers[name] || loadDashboard;
    await fn();
    setStatus("ok", "connected");
  } catch (e) {
    console.error("Dashboard error:", e);
    setStatus("error", "error");
    if (el) el.innerHTML =
      '<div class="error-box">Failed to load ' + name + '<pre>' + esc(e.stack || e.message || String(e)) + '</pre></div>' +
      oldContent;
  }
}

// ── Dashboard ──
async function loadDashboard() {
  var counts, recent;
  try {
    var res = await Promise.all([api("/api/tasks/counts"), api("/api/tasks/recent")]);
    counts = res[0];
    recent = res[1];
  } catch (e) {
    throw new Error("Failed to fetch dashboard data: " + e.message);
  }
  var c = counts;
  var html = '<div class="cards">' +
    '<div class="card"><div class="num" style="color:var(--blue)">' + c.queued + '</div><div class="label">Queued</div></div>' +
    '<div class="card"><div class="num" style="color:var(--green)">' + c.running + '</div><div class="label">Running</div></div>' +
    '<div class="card"><div class="num" style="color:var(--green)">' + c.completed + '</div><div class="label">Completed</div></div>' +
    '<div class="card"><div class="num" style="color:var(--red)">' + c.failed + '</div><div class="label">Failed</div></div>' +
    '</div>';
  html += '<h2 class="mb-12" style="font-size:15px;font-weight:600">Recent Activity</h2>';
  if (!recent.tasks || recent.tasks.length === 0) {
    html += '<div class="empty">No tasks yet. Send a prompt to OpenCode and they will appear here.</div>';
  } else {
    html += '<table><tr><th>ID</th><th>Agent</th><th>Status</th><th>Model</th><th>Progress</th><th>Mirror</th></tr>';
    for (var i = 0; i < recent.tasks.length; i++) {
      var t = recent.tasks[i];
      var mid = (t.id || "").slice(0, 8);
      var model = (t.output && t.output.model) || "-";
      var progress = t.progress || "";
      var ms = t.mirrorStatus;
      var msClass = "";
      if (ms === "pass") msClass = "mirror-pass";
      else if (ms === "fail") msClass = "mirror-fail";
      else if (ms === "needs-revision") msClass = "mirror-revision";
      html += '<tr><td class="tt">' + esc(mid) + '</td><td>' + esc(t.agentName) + '</td><td>' + badge(t.status) + '</td><td style="font-size:12px;color:var(--text2)">' + esc(model) + '</td><td><span class="progress-text">' + esc(progress) + '</span></td><td>' + (ms ? '<span class="' + msClass + '" style="font-size:12px">' + esc(ms) + '</span>' : '-') + '</td></tr>';
    }
    html += '</table>';
  }
  document.getElementById("content").innerHTML = html;
}

// ── Tasks ──
async function loadTasks() {
  var data;
  try {
    data = await api("/api/tasks");
  } catch (e) {
    throw new Error("Failed to fetch tasks: " + e.message);
  }
  var tasks = data.tasks || [];
  if (tasks.length === 0) {
    document.getElementById("content").innerHTML = '<div class="empty">No tasks.</div>';
    return;
  }
  var html = '<table><tr><th>ID</th><th>Agent</th><th>Status</th><th>Model</th><th>Progress</th><th>Retries</th><th>Mirror</th><th>Created</th></tr>';
  for (var i = 0; i < tasks.length; i++) {
    var t = tasks[i];
    var mid = (t.id || "").slice(0, 8);
    var model = (t.output && t.output.model) || "-";
    var progress = t.progress || "";
    var ms = t.mirrorStatus;
    var msClass = "";
    if (ms === "pass") msClass = "mirror-pass";
    else if (ms === "fail") msClass = "mirror-fail";
    else if (ms === "needs-revision") msClass = "mirror-revision";
    var created = t.createdAt ? new Date(t.createdAt).toLocaleTimeString() : "-";
    html += '<tr><td class="tt">' + esc(mid) + '</td><td>' + esc(t.agentName) + '</td><td>' + badge(t.status) + '</td><td style="font-size:12px;color:var(--text2)">' + esc(model) + '</td><td><span class="progress-text">' + esc(progress) + '</span></td><td>' + (t.retryCount != null ? t.retryCount + "/" + t.maxRetries : "-") + '</td><td>' + (ms ? '<span class="' + msClass + '" style="font-size:12px">' + esc(ms) + '</span>' : '-') + '</td><td style="font-size:12px;color:var(--text2)">' + esc(created) + '</td></tr>';
  }
  html += '</table>';
  document.getElementById("content").innerHTML = html;
}

// ── KB ──
async function loadKb() {
  var tree;
  try {
    tree = await api("/api/kb");
  } catch (e) {
    throw new Error("Failed to fetch KB tree: " + e.message);
  }
  if (!tree || tree.length === 0) {
    document.getElementById("content").innerHTML = '<div class="empty">Knowledge base is empty.</div>';
    return;
  }
  var root = document.getElementById("content");
  root.innerHTML = '<div class="kb-container"><div class="kb-tree-panel"><div class="kb-tree" id="kbTree"></div></div><div class="kb-preview-panel"><div class="kb-preview-empty" id="kbPreview">Select a file to preview</div></div></div>';
  renderTree(tree, document.getElementById("kbTree"));
}

function renderTree(entries, el) {
  if (!entries || !el) return;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (e.type === "dir") {
      var div = el.ownerDocument.createElement("div");
      div.className = "dir";
      div.textContent = e.name + "/";
      var children = el.ownerDocument.createElement("div");
      children.className = "children";
      (function(d, c) {
        d.onclick = function() { c.classList.toggle("open"); d.classList.toggle("open"); };
      })(div, children);
      if (selectedKbFile && e.name === selectedKbFile.split("/")[0]) {
        children.className += " open";
        div.className += " open";
      }
      el.appendChild(div);
      el.appendChild(children);
      if (e.children && e.children.length > 0) {
        renderTree(e.children, children);
      }
    } else {
      var fdiv = el.ownerDocument.createElement("div");
      fdiv.className = "file";
      var nameSpan = el.ownerDocument.createElement("span");
      nameSpan.textContent = e.name;
      var sizeSpan = el.ownerDocument.createElement("span");
      sizeSpan.className = "size";
      sizeSpan.textContent = formatSize(e.size);
      fdiv.appendChild(nameSpan);
      fdiv.appendChild(sizeSpan);
      (function(fn, n) {
        fdiv.onclick = function() { previewFile(n); };
      })(fdiv, e.name);
      el.appendChild(fdiv);
    }
  }
}

async function previewFile(name) {
  selectedKbFile = name;
  var preview = document.getElementById("kbPreview");
  if (!preview) return;
  preview.innerHTML = '<div style="font-size:11px;color:var(--text2);padding:16px">Loading ' + esc(name) + '...</div>';
  preview.className = "kb-preview";
  try {
    var data = await api("/api/kb/read?path=outbox/" + encodeURIComponent(name));
    var header = '<div style="font-size:11px;color:var(--text2);margin-bottom:12px;display:flex;justify-content:space-between"><span>outbox/' + esc(name) + '</span><span>' + formatSize(data.content ? data.content.length : 0) + '</span></div>';
    preview.innerHTML = header + renderMarkdown(data.content || "");
  } catch (e1) {
    try {
      var data2 = await api("/api/kb/read?path=" + encodeURIComponent(name));
      var header2 = '<div style="font-size:11px;color:var(--text2);margin-bottom:12px">' + esc(name) + '</div>';
      preview.innerHTML = header2 + renderMarkdown(data2.content || "");
    } catch (e2) {
      preview.innerHTML = '<div class="error-box">Failed to read file: ' + esc(e2.message) + '</div>';
    }
  }
}

function renderMarkdown(text) {
  if (!text) return "";
  var lines = text.split("\n");
  var html = "";
  var inCodeBlock = false;
  var codeBuf = [];
  var inList = false;
  var listTag = "";
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i];
    if (line.trim().startsWith("```")) {
      if (inCodeBlock) {
        html += '<pre><code>' + esc(codeBuf.join("\n")) + '</code></pre>\n';
        codeBuf = [];
        inCodeBlock = false;
      } else {
        inCodeBlock = true;
        codeBuf = [];
      }
      continue;
    }
    if (inCodeBlock) {
      codeBuf.push(line);
      continue;
    }
    if (line.trim() === "") {
      if (inList) { html += '</' + listTag + '>\n'; inList = false; }
      continue;
    }
    var h = line.match(/^(#{1,3})\s+(.+)/);
    if (h) {
      if (inList) { html += '</' + listTag + '>\n'; inList = false; }
      var level = h[1].length;
      html += '<h' + level + '>' + inlineMd(h[2]) + '</h' + level + '>\n';
      continue;
    }
    if (line.trim() === "---") {
      if (inList) { html += '</' + listTag + '>\n'; inList = false; }
      html += '<hr>\n';
      continue;
    }
    var li = line.match(/^(\s*)[-*+]\s+(.+)/);
    if (li) {
      if (!inList) { html += '<ul>\n'; inList = true; listTag = "ul"; }
      html += '<li>' + inlineMd(li[2]) + '</li>\n';
      continue;
    }
    var oli = line.match(/^(\s*)\d+\.\s+(.+)/);
    if (oli) {
      if (!inList) { html += '<ol>\n'; inList = true; listTag = "ol"; }
      html += '<li>' + inlineMd(oli[2]) + '</li>\n';
      continue;
    }
    var bq = line.match(/^>\s*(.*)/);
    if (bq) {
      if (inList) { html += '</' + listTag + '>\n'; inList = false; }
      html += '<blockquote>' + inlineMd(bq[1]) + '</blockquote>\n';
      continue;
    }
    var tbl = line.match(/^\|(.+)\|/);
    if (tbl) {
      continue;
    }
    if (inList) { html += '</' + listTag + '>\n'; inList = false; }
    html += '<p>' + inlineMd(line) + '</p>\n';
  }
  if (inCodeBlock) {
    html += '<pre><code>' + esc(codeBuf.join("\n")) + '</code></pre>\n';
  }
  if (inList) { html += '</' + listTag + '>\n'; }
  return html;
}

function inlineMd(text) {
  if (!text) return "";
  var t = esc(text);
  t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  t = t.replace(/\*(.+?)\*/g, "<em>$1</em>");
  t = t.replace(/`(.+?)`/g, "<code>$1</code>");
  return t;
}

function kbRefresh() {
  var content = document.getElementById("content");
  if (!content) return loadKb();
  var oldContainer = content.querySelector(".kb-container");
  if (!oldContainer) return loadKb();
  var oldPreview = document.getElementById("kbPreview");
  var oldTreeEl = document.getElementById("kbTree");
  var scrollTop = oldTreeEl ? oldTreeEl.parentElement.scrollTop : 0;
  var previewScrollTop = oldPreview ? oldPreview.parentElement.scrollTop : 0;
  api("/api/kb").then(function(tree) {
    if (!content.querySelector(".kb-container")) {
      loadKb();
      return;
    }
    var treePanel = content.querySelector(".kb-tree-panel");
    if (treePanel) {
      var newTreeEl = document.createElement("div");
      newTreeEl.className = "kb-tree";
      newTreeEl.id = "kbTree";
      renderTree(tree, newTreeEl);
      treePanel.innerHTML = "";
      treePanel.appendChild(newTreeEl);
      treePanel.scrollTop = scrollTop;
    }
    if (selectedKbFile && oldPreview && !oldPreview.classList.contains("kb-preview-empty")) {
      var newPreview = document.createElement("div");
      newPreview.className = "kb-preview";
      newPreview.id = "kbPreview";
      newPreview.innerHTML = '<div style="font-size:11px;color:var(--text2);padding:16px">Loading ' + esc(selectedKbFile) + '...</div>';
      var previewPanel = content.querySelector(".kb-preview-panel");
      if (previewPanel) {
        previewPanel.innerHTML = "";
        previewPanel.appendChild(newPreview);
      }
      api("/api/kb/read?path=outbox/" + encodeURIComponent(selectedKbFile)).then(function(data) {
        var header = '<div style="font-size:11px;color:var(--text2);margin-bottom:12px;display:flex;justify-content:space-between"><span>outbox/' + esc(selectedKbFile) + '</span><span>' + formatSize(data.content ? data.content.length : 0) + '</span></div>';
        newPreview.innerHTML = header + renderMarkdown(data.content || "");
        var pp = newPreview.parentElement;
        if (pp) pp.scrollTop = previewScrollTop;
      }).catch(function() {
        newPreview.innerHTML = '<div class="error-box">Failed to reload file</div>';
      });
    }
  }).catch(function() {
    loadKb();
  });
}

// ── Agents ──
async function loadAgents() {
  var data;
  try {
    data = await api("/api/agents");
  } catch (e) {
    throw new Error("Failed to fetch agents: " + e.message);
  }
  var agents = data.agents || [];
  var html = '<div class="agent-grid">';
  for (var i = 0; i < agents.length; i++) {
    var a = agents[i];
    var temp = "-";
    if (a.model && a.model.params && a.model.params.temperature != null) temp = a.model.params.temperature;
    var tools = (a.tools && a.tools.length > 0) ? a.tools.join(", ") : "-";
    html += '<div class="agent-card"><h3>' + esc(a.name) + '</h3>' +
      '<div class="field"><strong>model</strong> ' + esc(a.model ? a.model.id : "?") + '</div>' +
      '<div class="field"><strong>provider</strong> ' + esc(a.model && a.model.provider ? a.model.provider : "-") + '</div>' +
      '<div class="field"><strong>temperature</strong> ' + temp + '</div>' +
      '<div class="field"><strong>mirror</strong> ' + (a.mirror || "-") + '</div>' +
      '<div class="field"><strong>tools</strong> ' + esc(tools) + '</div>' +
      '<div class="field"><strong>maxRetries</strong> ' + (a.maxRetries != null ? a.maxRetries : 2) + '</div>' +
      (a.trigger ? '<div class="field"><strong>trigger</strong> ' + esc(a.trigger.event) + (a.trigger.filter ? " (" + esc(a.trigger.filter) + ")" : "") + '</div>' : "") +
      '</div>';
  }
  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

// ── DAGs ──
async function loadDags() {
  var data;
  try {
    data = await api("/api/dag-runs");
  } catch (e) {
    throw new Error("Failed to fetch DAG runs: " + e.message);
  }
  var runs = data.runs || [];
  var html = '<h2 class="mb-12" style="font-size:15px;font-weight:600">DAG Runs <span style="color:var(--text2);font-weight:400;font-size:13px">(' + runs.length + ')</span></h2><div class="dag-list">';
  if (runs.length === 0) {
    html += '<div class="empty">No DAG runs yet.</div>';
  } else {
    for (var i = 0; i < runs.length; i++) {
      var r = runs[i];
      var nodes = "-";
      if (r.definition && r.definition.nodes) nodes = Object.keys(r.definition.nodes).join(", ");
      html += '<div class="dag-item"><strong class="tt">' + esc(r.id) + '</strong><div class="dag-meta">nodes: ' + esc(nodes) + '</div></div>';
    }
  }
  html += '</div>';
  document.getElementById("content").innerHTML = html;
}

// ── Utils ──
function badge(status) {
  var cls = "badge b-" + (status || "unknown");
  return '<span class="' + cls + '">' + esc(status || "?") + '</span>';
}

function formatSize(bytes) {
  if (!bytes && bytes !== 0) return "";
  if (bytes < 1024) return bytes + "B";
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + "KB";
  return (bytes / 1048576).toFixed(1) + "MB";
}

function esc(s) {
  if (s == null) return "";
  var d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}

// ── Init ──
initTabs();
setStatus("loading", "connecting...");
loadAll();

var pollTimer = null;
document.getElementById("autoRefresh").addEventListener("change", function() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (this.checked) pollTimer = setInterval(function() {
    if (lastTab === "kb") {
      kbRefresh();
    } else {
      loadAll();
    }
  }, 3000);
});
</script>
